name: pixel_habit_tracker
description: A 2D pixel art themed habit tracker app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0
  uuid: ^4.2.0
  equatable: ^2.0.5
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/scenes/
    - assets/images/ui/
    - assets/images/nav/
    - assets/images/items/

  fonts:
    - family: PixelFont
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
    - family: SoftPixel
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
